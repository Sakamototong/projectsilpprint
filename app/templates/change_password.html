{% extends "base.html" %}
{% block title %}เปลี่ยนรหัสผ่าน – SilpPrint{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-header fw-bold">
        <i class="bi bi-key-fill me-1"></i>เปลี่ยนรหัสผ่าน
      </div>
      <div class="card-body">
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success py-2">{{ success }}</div>
        {% endif %}

        <form method="post" action="/web/change-password" novalidate>
          <div class="mb-3">
            <label class="form-label">รหัสผ่านปัจจุบัน <span class="text-danger">*</span></label>
            <input type="password" name="current_password" class="form-control" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label">รหัสผ่านใหม่ <span class="text-danger">*</span></label>
            <input type="password" name="new_password" class="form-control" required minlength="8"
                   id="newPwd">
            <div class="form-text">อย่างน้อย 8 ตัวอักษร ต้องมีทั้งตัวเลขและตัวอักษร</div>
          </div>
          <div class="mb-3">
            <label class="form-label">ยืนยันรหัสผ่านใหม่ <span class="text-danger">*</span></label>
            <input type="password" name="confirm_password" class="form-control" required minlength="8"
                   id="confirmPwd">
            <div class="invalid-feedback" id="matchError">รหัสผ่านไม่ตรงกัน</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-check-lg me-1"></i>เปลี่ยนรหัสผ่าน
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
  const np = document.getElementById('newPwd');
  const cp = document.getElementById('confirmPwd');
  if (np.value !== cp.value) {
    e.preventDefault();
    cp.classList.add('is-invalid');
  } else {
    cp.classList.remove('is-invalid');
  }
});
</script>
{% endblock %}
