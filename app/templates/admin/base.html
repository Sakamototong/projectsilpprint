<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin{% endblock %} — SilpPrint Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f2f5; }
    .sidebar { width: 240px; min-height: 100vh; background: #1a1d23; }
    .sidebar .nav-link { color: #adb5bd; border-radius: 6px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #2c3040; color: #fff; }
    .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; }
    .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
    .stat-card { border: none; border-radius: 12px; }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh">
  {% if admin_ctx %}
  <div class="sidebar d-flex flex-column p-3 gap-1">
    <a class="brand mb-3 text-decoration-none d-flex align-items-center gap-2" href="/admin/dashboard">
      <i class="bi bi-shield-fill-check text-primary fs-5"></i> SilpPrint Admin
    </a>
    <a href="/admin/dashboard" class="nav-link px-3 py-2 {% if active_page=='dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2 me-2"></i>Dashboard
    </a>
    <a href="/admin/stores" class="nav-link px-3 py-2 {% if active_page=='stores' %}active{% endif %}">
      <i class="bi bi-shop me-2"></i>ร้านค้า
    </a>
    <a href="/admin/plans" class="nav-link px-3 py-2 {% if active_page=='plans' %}active{% endif %}">
      <i class="bi bi-card-list me-2"></i>แผนการสมัคร
    </a>
    <a href="/admin/invoices" class="nav-link px-3 py-2 {% if active_page=='invoices' %}active{% endif %}">
      <i class="bi bi-receipt me-2"></i>ใบแจ้งชำระ
    </a>
    <a href="/admin/users" class="nav-link px-3 py-2 {% if active_page=='users' %}active{% endif %}">
      <i class="bi bi-people me-2"></i>ผู้ใช้งาน
    </a>
    <a href="/admin/usage" class="nav-link px-3 py-2 {% if active_page=='usage' %}active{% endif %}">
      <i class="bi bi-bar-chart me-2"></i>การใช้งาน
    </a>
    <hr class="border-secondary my-2">
    <a href="/admin/reports" class="nav-link px-3 py-2 {% if active_page=='reports' %}active{% endif %}">
      <i class="bi bi-file-earmark-bar-graph me-2"></i>รายงาน
    </a>
    <a href="/admin/reports/billing" class="nav-link px-3 py-2 {% if active_page=='reports' and request.url.path.endswith('billing') %}active{% endif %} ps-4 small text-secondary">
      <i class="bi bi-arrow-right-short me-1"></i>การเรียกเก็บ
    </a>
    <div class="mt-auto border-top border-secondary pt-3">
      <form method="post" action="/admin/logout">
        <button class="btn btn-sm btn-outline-danger w-100">
          <i class="bi bi-box-arrow-right me-1"></i>ออกจากระบบ
        </button>
      </form>
    </div>
  </div>
  {% endif %}
  <div class="main-content">
    {% if flash_msg %}
    <div class="alert alert-{{ flash_type|default('success') }} alert-dismissible fade show mb-3" role="alert">
      {{ flash_msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
