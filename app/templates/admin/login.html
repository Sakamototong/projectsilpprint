{% extends "admin/base.html" %}
{% block title %}เข้าสู่ระบบ Admin{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-fill-check text-primary fs-1"></i>
          <h4 class="mt-2 fw-bold">SilpPrint Admin</h4>
          <p class="text-muted small">เฉพาะผู้ดูแลระบบ</p>
        </div>
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input name="username" type="text" class="form-control" autocomplete="username" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input name="password" type="password" class="form-control" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>เข้าสู่ระบบ
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
